default: &default
  store_options:
    # Cap age of oldest cache entry to fulfill retention policies
    # max_age: <%= 60.days.to_i %>
    max_size: <%= 256.megabytes %>
    namespace: <%= Rails.env %>

development:
  <<: *default

test:
  <<: *default

# Supabase は 1 プロジェクト 1 DB のため、cache 用 DB は使わない（production.rb で :memory_store を指定）。
production:
  <<: *default
